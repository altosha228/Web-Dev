<div>
    <h1 class="arial_15px">{{product().name}}</h1>
    <img src="{{product().image}}" alt="">
    <p>{{product().description}}</p>
    <p>{{product().price}} ₸</p>
    <div class="rating-box">
        @for (star of [1, 2, 3, 4, 5]; track star) {
        <span [class.filled]="star <= product().rating">★</span>
        }
        <span class="rating-num">({{ product().rating }})</span>
    </div>
    <!-- <div class="images_wrapper">
        <img *ngFor="let image of product().images" src="{{image}}" alt="">
    </div> -->
    <div class="bottom-info">
        <p class="price">Цена: {{product().price}} ₸</p>
        
        <div class="share-buttons">
            <a [href]="getWhatsAppLink()" target="_blank" class="share-wa">WhatsApp</a>
            <a [href]="getTelegramLink()" target="_blank" class="share-tg">Telegram</a>
        </div>
        
        <a [href]="product().link" target="_blank" class="kaspi-link">Купить на Kaspi</a>
    </div>
</div>
